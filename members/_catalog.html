<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BrightCard デザイン見本 — 11デザイン</title>
<meta name="description" content="1つのデータで、11デザイン。専用デザインのデジタル名刺＋物理NFCカード。標準/差別化/オーナーの3ライン。">
<meta property="og:title" content="BrightCard デザイン見本 — 11デザイン">
<meta property="og:description" content="1つのデータで11デザイン。専用デザインのデジタル名刺＋物理NFCカード同梱。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://withbt.com/card/_catalog.html">
<meta property="og:image" content="https://withbt.com/card/og.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://withbt.com/card/og.jpg">
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#000;overflow:hidden;
  font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
  -webkit-font-smoothing:antialiased;color:#fff}
.stage{position:fixed;inset:0;top:52px;display:flex;overflow-x:auto;overflow-y:hidden;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stage::-webkit-scrollbar{display:none}
.slide{flex:0 0 100%;height:100%;scroll-snap-align:center;position:relative}
.slide iframe{width:100%;height:100%;border:0;display:block;background:#0a0a0a}
.bar{position:fixed;top:0;left:0;right:0;height:52px;z-index:20;display:flex;align-items:center;
  gap:8px;padding:0 14px;background:rgba(8,8,9,.92);border-bottom:1px solid rgba(255,255,255,.1)}
.bar .ttl{font-size:12px;letter-spacing:.16em;font-weight:700}
.bar .ttl small{font-weight:500;opacity:.6;letter-spacing:.04em;margin-left:6px}
.nav{position:fixed;bottom:max(16px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  z-index:15;display:flex;align-items:center;gap:12px;background:rgba(10,10,10,.6);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  padding:7px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.14)}
.arrow{width:30px;height:30px;border-radius:50%;border:0;background:rgba(255,255,255,.14);
  color:#fff;font-size:15px;cursor:pointer;display:grid;place-items:center;flex:none}
.arrow:hover{background:rgba(255,255,255,.26)}
.nlabel{font-size:12px;font-weight:600;letter-spacing:.03em;min-width:96px;text-align:center}
.dots{display:flex;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.32);transition:.25s}
.dot.on{background:#fff;width:18px;border-radius:3px}
</style>

<div class="bar">
  <span class="ttl">BRIGHTCARD デザイン見本<small>清田 兼明・同一データ×デザイン違い</small></span>
</div>
<div class="stage" id="stage"></div>
<div class="nav">
  <button class="arrow" id="prev" aria-label="前">‹</button>
  <span class="nlabel" id="nlabel"></span>
  <div class="dots" id="dots"></div>
  <button class="arrow" id="next" aria-label="次">›</button>
</div>

<script>
(function(){
  "use strict";
  // ★相対パス（_catalog.html と同じ階層に各カードフォルダがある）。ローカル・本番(withbt.com/card/)両対応。
  var DESIGNS=[
    {dir:"kiyota-sample/", name:"Bright"},
    {dir:"cmp-aura/",      name:"Aura"},
    {dir:"cmp-editorial/", name:"Editorial"},
    {dir:"cmp-washi/",     name:"Washi"},
    {dir:"cmp-minimal/",   name:"Minimal"},
    {dir:"cmp-onyx/",      name:"Onyx"},
    {dir:"cmp-alloy/",     name:"Alloy"},
    {dir:"cmp-kiln/",      name:"Kiln"},
    {dir:"cmp-flux/",      name:"Flux"},
    {dir:"cmp-kinari/",    name:"Kinari"},
    {dir:"cmp-owner/",     name:"Owner（GQ）"}
  ];
  var stage=document.getElementById("stage"),dotsWrap=document.getElementById("dots"),nlabel=document.getElementById("nlabel");
  var cur=0;
  DESIGNS.forEach(function(d,i){
    var s=document.createElement("div");s.className="slide";
    var f=document.createElement("iframe");f.src=d.dir;f.loading=i===0?"eager":"lazy";f.title=d.name;
    s.appendChild(f);stage.appendChild(s);
    var dot=document.createElement("span");dot.className="dot"+(i===0?" on":"");dotsWrap.appendChild(dot);
  });
  function setLabel(i){nlabel.textContent=DESIGNS[i].name;
    [].forEach.call(dotsWrap.children,function(d,j){d.classList.toggle("on",j===i);});}
  function setActive(i){if(i===cur)return;cur=i;setLabel(i);}
  setLabel(0);
  var raf=null;
  stage.addEventListener("scroll",function(){if(raf)return;
    raf=requestAnimationFrame(function(){raf=null;
      var i=Math.round(stage.scrollLeft/stage.clientWidth);
      i=Math.max(0,Math.min(DESIGNS.length-1,i));setActive(i);});});
  function goTo(i){i=Math.max(0,Math.min(DESIGNS.length-1,i));
    stage.scrollTo({left:i*stage.clientWidth,behavior:"smooth"});}
  document.getElementById("prev").addEventListener("click",function(){goTo(cur-1);});
  document.getElementById("next").addEventListener("click",function(){goTo(cur+1);});
  document.addEventListener("keydown",function(e){
    if(e.key==="ArrowRight")goTo(cur+1);if(e.key==="ArrowLeft")goTo(cur-1);});
})();
</script>
